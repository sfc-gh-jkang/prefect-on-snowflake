spec:
  containers:
    - name: pf-server
      image: /prefect_db/prefect_schema/prefect_repository/prefect:3.6.26-python3.12-1776424319
      command:
        - prefect
        - server
        - start
        - --host
        - "0.0.0.0"
        - --no-services
      env:
        PREFECT_API_DATABASE_MIGRATE_ON_START: "false"
        PREFECT_SERVER_API_HOST: "0.0.0.0"
        PREFECT_SERVER_UI_API_URL: "/api"
        PREFECT_MESSAGING_BROKER: "prefect_redis.messaging"
        PREFECT_MESSAGING_CACHE: "prefect_redis.messaging"
        PREFECT_REDIS_MESSAGING_HOST: "pf-redis"
        PREFECT_REDIS_MESSAGING_PORT: "6379"
        PREFECT_REDIS_MESSAGING_DB: "0"
        PREFECT_SERVER_METRICS_ENABLED: "true"
        PREFECT_SERVER_ANALYTICS_ENABLED: "false"
      secrets:
        - snowflakeSecret:
            objectName: prefect_db_password
          secretKeyRef: secret_string
          envVarName: PREFECT_API_DATABASE_CONNECTION_URL
      readinessProbe:
        port: 4200
        path: /api/health
  endpoints:
    - name: api
      port: 4200
      public: true
  platformMonitor:
    metricConfig:
      groups:
        - system
        - system_limits
