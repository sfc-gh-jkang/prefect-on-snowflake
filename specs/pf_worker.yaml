spec:
  containers:
    - name: pf-worker
      # Using :latest for dev convenience. For production rollback support,
      # pin to a git-SHA tag (e.g., prefect-worker:c8a115d) and update via
      # ALTER SERVICE ... FROM @PREFECT_SPECS SPECIFICATION_FILE = 'pf_worker.yaml';
      image: /prefect_db/prefect_schema/prefect_repository/prefect-worker:latest
      command:
        - /opt/prefect/.venv/bin/python
        - /opt/prefect/otel_entrypoint.py
        - /opt/prefect/.venv/bin/prefect
        - worker
        - start
        - --pool
        - spcs-pool
        - --type
        - process
        - --with-healthcheck
      resources:
        requests:
          cpu: 0.5
          memory: 1Gi
        limits:
          cpu: 2
          memory: 4Gi
      env:
        PREFECT_API_URL: "http://pf-server:4200/api"
        SNOWFLAKE_WAREHOUSE: "COMPUTE_WH"
        GIT_REPO_URL: "CHANGE_ME_GIT_REPO_URL"
        GIT_BRANCH: "main"
        PREFECT_WORKER_WEBSERVER_HOST: "0.0.0.0"
        PREFECT_WORKER_WEBSERVER_PORT: "8080"
        # OTel trace export — both parent worker and child flow-run processes
        # use SimpleSpanProcessor (fresh HTTP connection per export) to avoid
        # ConnectionResetError(104) from urllib3 connection pool poisoning
        # between SPCS containers.  The parent uses otel_entrypoint.py; child
        # processes pick up a custom sitecustomize.py via PYTHONPATH that also
        # configures SimpleSpanProcessor.
        #
        # Both parent and child export to the co-located observe-agent sidecar
        # at localhost:4318 (HTTP OTLP).  The observe-agent authenticates with
        # Observe and forwards traces to the collect endpoint.
        OTEL_SERVICE_NAME: "prefect-worker-spcs"
        OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
        OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4318"
        OTEL_TRACES_EXPORTER: "otlp"
        OTEL_METRICS_EXPORTER: "none"
        OTEL_LOGS_EXPORTER: "none"
        OTEL_PYTHON_DISABLED_INSTRUMENTATIONS: "system_metrics"
        OTEL_RESOURCE_ATTRIBUTES: "deployment.environment.name=spcs,service.namespace=prefect"
        OTEL_TRACES_SAMPLER: "parentbased_always_on"
        # OTel child-process propagation — otel_entrypoint.py copies this to
        # PYTHONPATH after configuring SimpleSpanProcessor for the parent.
        # We use a custom env var (OTEL_PYTHONPATH) instead of PYTHONPATH
        # directly because Python imports sitecustomize.py from PYTHONPATH
        # during interpreter startup — BEFORE any user code runs.  If we
        # set PYTHONPATH here, a sitecustomize.py would run before
        # otel_entrypoint.py can configure SimpleSpanProcessor.
        #
        # Points to /opt/prefect/otel_sitecustomize/ which contains a custom
        # sitecustomize.py that uses SimpleSpanProcessor (not BatchSpanProcessor)
        # to avoid ConnectionResetError(104) from urllib3 connection pool
        # poisoning between SPCS containers.
        OTEL_PYTHONPATH: "/opt/prefect/otel_sitecustomize"
      secrets:
        - snowflakeSecret:
            objectName: git_access_token
          secretKeyRef: secret_string
          envVarName: GIT_ACCESS_TOKEN
      volumeMounts:
        - name: flows
          mountPath: /opt/prefect/flows
      readinessProbe:
        port: 8080
        path: /health

    # ── Observe Agent sidecar — OTLP relay for APM traces ──────────────
    # The pf-worker sends OTLP traces to this sidecar at localhost:4318.
    # The observe-agent authenticates with Observe (token baked into config)
    # and forwards traces to the collect endpoint via MONITOR_EGRESS_EAI.
    # This is more reliable than direct export, which times out through SPCS EAI.
    # Config is mounted from @MONITOR_STAGE/observe-agent/ with token/URL
    # baked in at deploy time by monitoring/deploy_monitoring.sh.
    - name: observe-agent
      image: /prefect_db/prefect_schema/prefect_repository/observe-agent:2.0.0
      resources:
        requests:
          cpu: 0.1
          memory: 128M
        limits:
          cpu: 0.2
          memory: 256M
      volumeMounts:
        - name: observe-config
          mountPath: /etc/observe-agent
      readinessProbe:
        port: 13133
        path: /status

  endpoints:
    - name: health
      port: 8080
  # Stage volume: mounts @PREFECT_FLOWS at /opt/prefect/flows as a backup for
  # git_clone pull steps. Primary code delivery is git_clone (prefect.yaml);
  # the stage mount provides a fallback when GIT_REPO_URL is not configured
  # and keeps flow code available for the deploy job pattern.
  volumes:
    - name: flows
      source: stage
      stageConfig:
        name: "@PREFECT_DB.PREFECT_SCHEMA.PREFECT_FLOWS"
      uid: 0
      gid: 0
    # Observe Agent config — mounted from stage (token/URL baked in at deploy time)
    - name: observe-config
      source: stage
      stageConfig:
        name: "@PREFECT_DB.PREFECT_SCHEMA.MONITOR_STAGE/observe-agent"
      uid: 0
      gid: 0
  platformMonitor:
    metricConfig:
      groups:
        - system
        - system_limits
