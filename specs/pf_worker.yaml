spec:
  containers:
    - name: pf-worker
      # Using :latest for dev convenience. For production rollback support,
      # pin to a git-SHA tag (e.g., prefect-worker:c8a115d) and update via
      # ALTER SERVICE ... FROM @PREFECT_SPECS SPECIFICATION_FILE = 'pf_worker.yaml';
      image: /prefect_db/prefect_schema/prefect_repository/prefect-worker:latest
      command:
        - /opt/prefect/.venv/bin/opentelemetry-instrument
        - /opt/prefect/.venv/bin/prefect
        - worker
        - start
        - --pool
        - spcs-pool
        - --type
        - process
        - --with-healthcheck
      resources:
        requests:
          cpu: 0.5
          memory: 1Gi
        limits:
          cpu: 2
          memory: 4Gi
      env:
        PREFECT_API_URL: "http://pf-server:4200/api"
        SNOWFLAKE_WAREHOUSE: "COMPUTE_WH"
        GIT_REPO_URL: "CHANGE_ME_GIT_REPO_URL"
        GIT_BRANCH: "main"
        PREFECT_WORKER_WEBSERVER_HOST: "0.0.0.0"
        PREFECT_WORKER_WEBSERVER_PORT: "8080"
        # OTel auto-instrumentation — export traces directly to Observe collect endpoint.
        # Uses HTTP/protobuf OTLP with datastream token auth.  The observe-agent sidecar
        # is kept for host/self monitoring but traces bypass it to avoid localhost
        # gRPC/HTTP connectivity issues inside SPCS pods.
        #
        # Placeholders are substituted by deploy.sh (upload_specs) from .env:
        #   __OBSERVE_COLLECTION_URL__ → OBSERVE_COLLECTION_URL
        #   __OBSERVE_DATASTREAM_TOKEN__ → OBSERVE_DATASTREAM_TOKEN
        OTEL_SERVICE_NAME: "prefect-worker-spcs"
        OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
        OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "__OBSERVE_COLLECTION_URL__/v1/otel/v1/traces"
        OTEL_EXPORTER_OTLP_TRACES_HEADERS: "authorization=Bearer __OBSERVE_DATASTREAM_TOKEN__"
        OTEL_TRACES_EXPORTER: "otlp"
        OTEL_METRICS_EXPORTER: "none"
        OTEL_LOGS_EXPORTER: "none"
        OTEL_RESOURCE_ATTRIBUTES: "deployment.environment.name=spcs,service.namespace=prefect"
        OTEL_TRACES_SAMPLER: "parentbased_always_on"
      secrets:
        - snowflakeSecret:
            objectName: git_access_token
          secretKeyRef: secret_string
          envVarName: GIT_ACCESS_TOKEN
      volumeMounts:
        - name: flows
          mountPath: /opt/prefect/flows
      readinessProbe:
        port: 8080
        path: /health

    # ── Observe Agent sidecar — OTLP relay for APM traces ──────────────
    # Accepts OTLP traces from the co-located pf-worker via localhost:4318.
    # Forwards traces to Observe's collect endpoint using MONITOR_EGRESS_EAI.
    # Config is mounted from @MONITOR_STAGE/observe-agent/ with token/URL
    # baked in at deploy time by monitoring/deploy_monitoring.sh.
    - name: observe-agent
      image: /prefect_db/prefect_schema/prefect_repository/observe-agent:2.0.0
      resources:
        requests:
          cpu: 0.1
          memory: 128M
        limits:
          cpu: 0.2
          memory: 256M
      volumeMounts:
        - name: observe-config
          mountPath: /etc/observe-agent
      readinessProbe:
        port: 13133
        path: /status

  endpoints:
    - name: health
      port: 8080
  # Stage volume: mounts @PREFECT_FLOWS at /opt/prefect/flows as a backup for
  # git_clone pull steps. Primary code delivery is git_clone (prefect.yaml);
  # the stage mount provides a fallback when GIT_REPO_URL is not configured
  # and keeps flow code available for the deploy job pattern.
  volumes:
    - name: flows
      source: stage
      stageConfig:
        name: "@PREFECT_DB.PREFECT_SCHEMA.PREFECT_FLOWS"
      uid: 0
      gid: 0
    # Observe Agent config — mounted from stage (token/URL baked in at deploy time)
    - name: observe-config
      source: stage
      stageConfig:
        name: "@PREFECT_DB.PREFECT_SCHEMA.MONITOR_STAGE/observe-agent"
      uid: 0
      gid: 0
  platformMonitor:
    metricConfig:
      groups:
        - system
        - system_limits
