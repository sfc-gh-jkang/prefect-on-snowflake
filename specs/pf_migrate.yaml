spec:
  containers:
    - name: pf-migrate
      image: /prefect_db/prefect_schema/prefect_repository/prefect:3.6.26-python3.12-1776424319
      command:
        - prefect
        - server
        - database
        - upgrade
        - "-y"
      secrets:
        - snowflakeSecret:
            objectName: prefect_db_password
          secretKeyRef: secret_string
          envVarName: PREFECT_API_DATABASE_CONNECTION_URL
