        timezone: "UTC"
    enforce_parameter_schema: true
    description: "Daily cleanup of stale files from Snowflake stages"

  - name: stage-cleanup-aws
    entrypoint: stage_cleanup_flow.py:stage_cleanup
    work_pool:
