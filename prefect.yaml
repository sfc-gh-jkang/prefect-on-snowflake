# =============================================================================
# prefect.yaml — Declarative deployment configuration
#
# Registers all flow deployments with:  prefect deploy --all
#
# Pull strategy: git_clone from the project repo. Workers clone at runtime
# and set the working directory to flows/ so entrypoints and imports resolve correctly.
#
# Environment variables (must be set on the worker or in the shell):
#   GIT_REPO_URL       — HTTPS URL to your git repo
#   GIT_BRANCH         — Branch to clone (default: main)
#   GIT_ACCESS_TOKEN   — Access token for private repos
# =============================================================================

pull:
  - prefect.deployments.steps.git_clone:
      id: clone
      repository: "{{ $GIT_REPO_URL }}"
      branch: "{{ $GIT_BRANCH }}"
      access_token: "{{ $GIT_ACCESS_TOKEN }}"
  - prefect.deployments.steps.set_working_directory:
      directory: "{{ clone.directory }}/flows"

deployments:
  # ===========================================================================
  # example-flow — Hello world flow to verify worker connectivity
  # ===========================================================================
  - name: example-flow-local
    entrypoint: example_flow.py:example_flow
    work_pool:
      name: spcs-pool
    tags: [spcs, example]
    parameters:
      name: "Prefect-SPCS"
    schedules:
      - interval: 3600
    enforce_parameter_schema: true
    description: "Hello world flow to verify worker connectivity"

  - name: example-flow-gcp
    entrypoint: example_flow.py:example_flow
    work_pool:
      name: gcp-pool
    tags: [gcp, example]
    parameters:
      name: "Prefect-SPCS"
    schedules:
      - interval: 3600
    enforce_parameter_schema: true
    description: "Hello world flow to verify worker connectivity"

  - name: example-flow-aws
    entrypoint: example_flow.py:example_flow
    work_pool:
      name: aws-pool
    tags: [aws, example]
    parameters:
      name: "Prefect-SPCS"
    schedules:
      - interval: 3600
    enforce_parameter_schema: true
    description: "Hello world flow to verify worker connectivity"

  - name: example-flow-azure
    entrypoint: example_flow.py:example_flow
    work_pool:
      name: azure-pool
    tags: [azure, example]
    parameters:
      name: "Prefect-SPCS"
    schedules:
