# =============================================================================
# prefect.yaml — Declarative deployment configuration
#
# Registers all flow deployments with:  prefect deploy --all
#
# Pull strategy: git_clone from the project repo. Workers clone at runtime
# and set the working directory to flows/ so entrypoints and imports resolve correctly.
#
# Environment variables (must be set on the worker or in the shell):
#   GIT_REPO_URL       — HTTPS URL to your git repo
#   GIT_BRANCH         — Branch to clone (default: main)
#   GIT_ACCESS_TOKEN   — Access token for private repos
#
# Active flows (4):
#   health-check      — SPCS infrastructure health checks (every 15m, spcs-pool only)
#   stage-cleanup     — Remove stale files from Snowflake stages (daily 3 AM UTC)
#   data-quality      — Table freshness, row count, existence checks (daily 7 AM UTC)
#   quarterly-report  — Nested import stress test (quarterly, 1st of Jan/Apr/Jul/Oct)
# =============================================================================

pull:
  - prefect.deployments.steps.git_clone:
      id: clone
      repository: "{{ $GIT_REPO_URL }}"
      branch: "{{ $GIT_BRANCH }}"
      access_token: "{{ $GIT_ACCESS_TOKEN }}"
  - prefect.deployments.steps.set_working_directory:
      directory: "{{ clone.directory }}/flows"

deployments:
  # ===========================================================================
  # health-check — Infrastructure health check every 15 minutes (SPCS only)
  # ===========================================================================
  - name: health-check-local
    entrypoint: health_check_flow.py:health_check
    work_pool:
      name: spcs-pool
    tags: [spcs, monitoring, infra]
    concurrency_limit:
      limit: 1
      collision_strategy: CANCEL_NEW
    schedules:
      - interval: 900
    enforce_parameter_schema: true
    description: "Infrastructure health check: Snowflake, SPCS services, compute pools"

  # ===========================================================================
  # stage-cleanup — Daily cleanup of stale files from Snowflake stages
  # ===========================================================================
  - name: stage-cleanup-local
    entrypoint: stage_cleanup_flow.py:stage_cleanup
    work_pool:
      name: spcs-pool
    tags: [spcs, maintenance, storage]
    parameters:
      retention_days: 30
    schedules:
      - cron: "0 3 * * *"
        timezone: "UTC"
    enforce_parameter_schema: true
    description: "Daily cleanup of stale files from Snowflake stages"

  - name: stage-cleanup-gcp
    entrypoint: stage_cleanup_flow.py:stage_cleanup
    work_pool:
      name: gcp-pool
    tags: [gcp, maintenance, storage]
