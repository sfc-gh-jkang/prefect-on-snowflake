# Auth proxy for SPCS Prefect server.
# Injects Snowflake PAT auth header and forwards to the SPCS public endpoint.
# The Prefect worker talks to this proxy at http://auth-proxy:4200.
#
# NOTE: This is a template. At container startup, envsubst replaces
# SNOWFLAKE_PAT and SPCS_ENDPOINT env vars with actual values.

worker_processes 1;

events {
    worker_connections 256;
}

http {
    # Resolve SPCS endpoint DNS (use Google DNS for GCP)
    resolver 8.8.8.8 valid=60s;

    # WebSocket support: conditionally set Connection header
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    server {
        listen 4200;

        location / {
            # Forward to SPCS public endpoint
            proxy_pass https://${SPCS_ENDPOINT};
            proxy_ssl_server_name on;
            proxy_http_version 1.1;

            # WebSocket support (Prefect events stream)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Inject Snowflake PAT auth
            proxy_set_header Authorization "Snowflake Token=\"${SNOWFLAKE_PAT}\"";
            proxy_set_header Host ${SPCS_ENDPOINT};

            # Pass through standard headers
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-polling (Prefect worker polls)
            proxy_connect_timeout 30s;
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
        }
    }
}
