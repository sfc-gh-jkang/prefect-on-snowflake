# Loki configuration — single-instance mode for SPCS.
# Receives logs from Promtail agents on VMs via HTTP push.

auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

tracing:
  enabled: false

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /etc/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h   # 7 days
  max_query_length: 721h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20

ruler:
  storage:
    type: local
    local:
      directory: /etc/loki/rules
  rule_path: /loki/rules-tmp
  # alertmanager_url disabled (empty) — Grafana's unified alerting AM API
  # returns 400 Bad Request for Loki-generated alerts. Loki ruler still
  # evaluates rules locally; Grafana queries state via /loki/api/v1/rules.
  alertmanager_url: ""
  ring:
    kvstore:
      store: inmemory
  enable_api: true

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  delete_request_store: filesystem
