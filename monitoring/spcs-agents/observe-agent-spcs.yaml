# observe-agent-spcs.yaml — Observe Agent config for SPCS sidecar.
# Runs as a container alongside PF_WORKER as the primary OTLP relay.
#
# PF_WORKER sends traces to this agent at localhost:4318 (HTTP OTLP).
# The agent authenticates with Observe (token baked into this file at
# deploy time) and forwards traces to the collect endpoint.  This is
# more reliable than direct-to-Observe export, which times out through
# the SPCS EAI network path.
#
# No host_monitoring or docker_stats — those don't apply inside SPCS.
# O4S handles SPCS container metrics/logs via ACCOUNT_USAGE + Event Table.
#
# IMPORTANT: token and observe_url MUST be literal values — the observe-agent
# does NOT read environment variables for authentication.

token: "__OBSERVE_TOKEN__"
observe_url: "__OBSERVE_URL__"

# Accept OTLP traces/metrics/logs from other SPCS services.
# Each signal type (traces, metrics, logs) must be explicitly enabled
# for the forwarding pipeline to handle it.
forwarding:
  enabled: true
  traces:
    enabled: true
  metrics:
    enabled: true
    output_format: otel
  logs:
    enabled: true
  endpoints:
    grpc: 0.0.0.0:4317
    http: 0.0.0.0:4318

# All built-in connections disabled — SPCS volume mount overwrites
# /etc/observe-agent, removing the built-in connections/ templates.
# This agent is purely an OTLP relay; no host/app monitoring needed.
host_monitoring:
  enabled: false
self_monitoring:
  enabled: false

resource_attributes:
  service.name: prefect-spcs-observe-relay
  deployment.environment.name: spcs

# Override the otlphttp/observe exporter auth header to use an Observe
# datastream token.  The observe-agent internally constructs the Authorization
# header from the top-level `token` field as "Bearer <customer_id>:<api_key>",
# but Observe's /v2/otel endpoint rejects this format with 401.
# The datastream token is required for auth to pass.
#
# IMPORTANT: The datastream token must be for a datastream that has OTLP
# trace processing enabled.  If traces appear in the wrong datastream or
# not at all in Tracing/Span, check the datastream configuration in Observe.
#
# IMPORTANT: Only override the exporter — do NOT re-declare receivers or
# pipelines here, as that causes a config merge conflict that breaks the
# otlp receiver's trace data_type registration.
otel_config_overrides:
  exporters:
    otlphttp/observe:
      headers:
        authorization: "Bearer __OBSERVE_DATASTREAM_TOKEN__"

debug: false
