# Prometheus configuration for local development.
# Scrapes the same targets as SPCS but using docker-compose service names.
# Usage:
#   docker compose -f docker-compose.yaml \
#                  -f docker-compose.monitoring-local.yml up -d

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prefect Server — /api/metrics
  - job_name: prefect-server
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - prefect-server:4200
        labels:
          service: prefect-server
          environment: local

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # Grafana — root path locally (no /grafana/ subpath)
  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000

  # Loki
  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100

  # PostgreSQL — postgres-exporter scrapes the local compose postgres
  - job_name: postgres
    metrics_path: /metrics
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          service: postgres
          environment: local
