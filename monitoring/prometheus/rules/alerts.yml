# Prometheus alerting rules for Prefect SPCS platform.

groups:
  - name: spcs_health
    rules:
      # Container restart storm
      - alert: HighContainerRestarts
        expr: increase(container_restarts_total[5m]) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container }} restarting frequently"
          description: "{{ $labels.container }} in {{ $labels.service }} has restarted {{ $value }} times in 5 minutes."

      # CPU saturation
      - alert: HighCPUUsage
        expr: (container_cpu_usage / container_cpu_limit) * 100 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.container }}"
          description: "{{ $labels.container }} CPU at {{ $value | humanize }}% for 10+ minutes."

      # Memory saturation
      - alert: HighMemoryUsage
        expr: (container_memory_usage / container_memory_limit) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Memory pressure on {{ $labels.container }}"
          description: "{{ $labels.container }} memory at {{ $value | humanize }}%. OOM risk."

  - name: prefect_server
    rules:
      # Prefect server down — only fires when Prometheus can reach the target
      # but the scrape fails (up==0). Does NOT fire when the target is absent
      # entirely (e.g. entire stack is stopped), preventing alert storms.
      - alert: PrefectServerDown
        expr: up{job="prefect-server"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Prefect server is down"
          description: "No successful scrape of Prefect server for 5+ minutes."

      # High flow failure rate (new failures only, auto-resolves)
      - alert: HighFlowFailureRate
        expr: sum(delta(prefect_flow_runs{state=~"FAILED|CRASHED"}[5m])) > 0
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "New flow failures detected"
          description: "{{ $value }} new failed/crashed flow runs in the last 5 minutes."

  - name: vm_workers
    rules:
      # Worker offline — uses Prefect exporter metrics (tracks all pools).
      # The old "up{job=~prefect-worker-.*}" approach doesn't work because
      # the SPCS worker has no /metrics endpoint (always up=0) and VM workers
      # push via remote_write (no scrape target). Instead we check the
      # work-pool-level metric from the prefect-exporter sidecar.
      # Grafana also has a parallel worker-offline alert for email notifications.
      # Guard: only fires when the metric actually exists (exporter is running),
      # preventing alert storms when the entire stack is down.
      - alert: WorkerOffline
        expr: |
          sum(prefect_work_pool_workers{status="ONLINE"}) == 0
          and on() (absent(prefect_work_pool_workers{status="ONLINE"}) == 0)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "All Prefect workers offline"
          description: "No online workers across any work pool for 5+ minutes. Flow runs will not execute."

      # VM disk pressure
      - alert: DiskSpaceRunningLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk on {{ $labels.instance }}"
          description: "{{ $labels.instance }} root disk at {{ $value | humanize }}% free."
