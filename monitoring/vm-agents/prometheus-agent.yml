# Prometheus agent config for VM workers.
# Scrapes local exporters (node_exporter, cAdvisor) and remote_writes
# to the central Prometheus on SPCS.
#
# The SPCS endpoint requires Snowflake PAT authentication, injected via
# the auth-proxy sidecar (same as the Prefect worker).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    # CRITICAL: These labels MUST be unique across every VM that remote_writes
    # to the same SPCS Prometheus receiver. Duplicate labels cause identical
    # time series from multiple sources, which triggers "Out of order sample"
    # errors (thousands per minute) and drops metrics silently.
    #
    # Examples of CORRECT unique values across 3 VMs:
    #   VM1: WORKER_LOCATION=aws-us-west-2       WORKER_POOL=aws-pool
    #   VM2: WORKER_LOCATION=aws-us-west-2-backup WORKER_POOL=aws-pool-backup
    #   VM3: WORKER_LOCATION=gcp-us-central1      WORKER_POOL=gcp-pool
    #
    # After changing these labels on a running VM, you MUST clear the
    # Prometheus WAL to avoid stale series with old labels:
    #   docker compose ... down
    #   docker volume rm <project>_prometheus-agent-data   # or prune
    #   docker compose ... up -d
    worker_location: "${WORKER_LOCATION}"
    worker_pool: "${WORKER_POOL}"

scrape_configs:
  # Host metrics (CPU, memory, disk, network)
  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  # Docker container metrics (per-container CPU, memory, network, disk I/O)
  # cAdvisor runs with --docker_only=true --disable_root_cgroup_stats=true
  # so only Docker container metrics are exposed (no host cgroups / NaN noise).
  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

# Push all scraped metrics to the SPCS Prometheus remote_write receiver.
# The auth-proxy-monitor sidecar handles PAT injection for SPCS auth.
remote_write:
  - url: "http://auth-proxy-monitor:4210/api/v1/write"
    # Use default v1 protobuf — v2 ("io.prometheus.write.v2.Request") causes
    # "Out of order sample" errors on the SPCS Prometheus receiver.
    queue_config:
      capacity: 5000
      max_shards: 5
      max_samples_per_send: 1000
      batch_send_deadline: 5s
