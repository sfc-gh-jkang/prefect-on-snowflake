# nginx auth-proxy for monitoring traffic from VMs to SPCS.
# Injects Snowflake PAT authentication for Prometheus remote_write and Loki push.
# Separate from the main auth-proxy to keep monitoring traffic isolated.
#
# Listens on:
#   4210 — proxies to SPCS Prometheus (remote_write receiver)
#   4220 — proxies to SPCS Loki (log push endpoint)

worker_processes 1;
error_log /dev/stderr warn;

events {
    worker_connections 128;
}

http {
    # DNS resolver — use Google DNS for GCP, Amazon VPC DNS for AWS.
    # Overridden per-environment in docker-compose.
    resolver ${DNS_RESOLVER} valid=30s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --- Prometheus remote_write proxy (port 4210) ---
    server {
        listen 4210;

        location / {
            proxy_pass https://${SPCS_MONITOR_ENDPOINT}:443;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_ssl_name ${SPCS_MONITOR_ENDPOINT};
            proxy_set_header Host ${SPCS_MONITOR_ENDPOINT};
            proxy_set_header Authorization "Snowflake Token=\"${SNOWFLAKE_PAT}\"";
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            client_max_body_size 10m;
        }
    }

    # --- Loki push proxy (port 4220) ---
    server {
        listen 4220;

        location / {
            proxy_pass https://${SPCS_MONITOR_LOKI_ENDPOINT}:443;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_ssl_name ${SPCS_MONITOR_LOKI_ENDPOINT};
            proxy_set_header Host ${SPCS_MONITOR_LOKI_ENDPOINT};
            proxy_set_header Authorization "Snowflake Token=\"${SNOWFLAKE_PAT}\"";
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            client_max_body_size 10m;
        }
    }
}
