# Grafana datasource provisioning — auto-configures Prometheus and Loki.
# deleteDatasources removes stale DB-cached entries whose UIDs don't match
# the provisioned ones, ensuring dashboards referencing uid=prometheus/loki work.
apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    orgId: 1
    url: http://localhost:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
    version: 1
    editable: false

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    orgId: 1
    url: http://localhost:3100
    isDefault: false
    version: 1
    editable: false
