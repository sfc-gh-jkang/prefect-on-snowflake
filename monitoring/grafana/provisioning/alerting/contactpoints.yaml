# Grafana alerting contact points — provisioned on startup.
# Sends alert notifications via Slack and/or email.
# Set GF_SMTP_* environment variables on the Grafana container to enable email.
apiVersion: 1

deleteContactPoints:
  - orgId: 1
    uid: webhook-receiver
  - orgId: 1
    uid: ""

contactPoints:
  - orgId: 1
    name: prefect-alerts
    receivers:
      # Slack — posts to a channel via incoming webhook.
      # Set GF_ALERTING_SLACK_WEBHOOK_URL env var or Snowflake secret.
      - uid: slack-receiver
        type: slack
        settings:
          url: ${GF_ALERTING_SLACK_WEBHOOK_URL}
          recipient: "#prefect-alerts"
          mentionChannel: here
          title: |
            {{ template "default.title" . }}
          text: |
            {{ template "default.message" . }}
        disableResolveMessage: false

      # Email — sends via Gmail SMTP (configured via GF_SMTP_* env vars).
      # Requires GRAFANA_SMTP_PASSWORD secret in Snowflake and
      # smtp.gmail.com:587 in MONITOR_EGRESS_RULE.
      - uid: email-receiver
        type: email
        settings:
          addresses: ${GF_SMTP_ALERT_RECIPIENTS}
          singleEmail: true
        disableResolveMessage: false
