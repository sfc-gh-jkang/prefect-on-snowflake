# Grafana-managed alert rules -- supplements Prometheus alerting rules.
# These rules use Grafana unified alerting and can query both Prometheus and Loki.
apiVersion: 1

groups:
  - orgId: 1
    name: prefect-grafana-alerts
    folder: Prefect SPCS
    interval: 60s
    rules:
      # -- Exporter stale -- no successful poll in 2+ minutes --------
      - uid: exporter-stale
        title: Prefect Exporter Stale
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: prefect_exporter_poll_duration_seconds
              instant: true
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [0.001]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 2m
        labels:
          severity: warning
          source: grafana
        annotations:
          summary: "Prefect exporter not polling"
          description: "The prefect-exporter sidecar has not completed a poll cycle in 2+ minutes (last poll duration: {{ if $values.B }}{{ $values.B.Value }}s{{ else }}unknown{{ end }}). The exporter process may be stuck or crashed. Check container logs: docker logs prefect-exporter."

      # -- Flow run duration regression -----------------------------
      - uid: flow-duration-regression
        title: Flow Run Duration Regression
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: prefect_flow_run_duration_p95_seconds
              instant: true
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [300]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 5m
        labels:
          severity: warning
          source: grafana
        annotations:
          summary: "Flow p95 duration {{ if $values.B }}{{ printf \"%.0f\" $values.B.Value }}s{{ else }}elevated{{ end }} (threshold: 300s)"
          description: "P95 flow run duration is {{ if $values.B }}{{ printf \"%.0f\" $values.B.Value }}s{{ else }}unknown{{ end }}, exceeding the 300s threshold for 5+ minutes. Possible causes: slow Snowflake queries, resource contention, new flow logic, or upstream data volume increase."

      # -- SPCS error log spike (Loki) ------------------------------
      - uid: loki-error-spike
        title: SPCS Error Log Spike
        condition: C
        data:
          - refId: A
            datasourceUid: loki
            model:
              expr: 'sum(count_over_time({job="spcs-logs", severity="ERROR"} !~ "OCSP|empty ring|ssl.*cannot be changed|Out of order sample"[5m]))'
              instant: true
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [10]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 2m
        labels:
          severity: warning
          source: grafana
        annotations:
          summary: "{{ if $values.B }}{{ printf \"%.0f\" $values.B.Value }}{{ else }}Multiple{{ end }} SPCS errors in 5 min (threshold: 10)"
          description: "{{ if $values.B }}{{ printf \"%.0f\" $values.B.Value }}{{ else }}Multiple{{ end }} ERROR-level log entries from SPCS services in the last 5 minutes. Check Grafana Explore with Loki datasource: {job=\"spcs-logs\", severity=\"ERROR\"}."

      # -- New flow run failures (rate-based, auto-resolves) --------
      - uid: flow-run-failure
        title: Flow Run Failure
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: sum(delta(prefect_flow_runs{state=~"FAILED|CRASHED"}[5m]))
              instant: true
              refId: A
            relativeTimeRange:
              from: 600
              to: 0
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 0s
        labels:
          severity: warning
          source: grafana
        annotations:
          summary: "{{ if $values.B }}{{ printf \"%.0f\" $values.B.Value }}{{ else }}Multiple{{ end }} flow run(s) failed in last 5 min"
          description: "{{ if $values.B }}{{ printf \"%.0f\" $values.B.Value }}{{ else }}Multiple{{ end }} flow runs entered FAILED or CRASHED state in the last 5 minutes. Check Prefect UI: Flow Runs filtered by Failed/Crashed state for details and stack traces."

      # -- Worker offline -- no heartbeat in 5+ minutes -------------
      # Monitors all pools with deployed workers (spcs, aws, gcp).
      - uid: worker-offline
        title: Prefect Worker Offline
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: prefect_work_pool_workers{status="ONLINE", pool_name=~"spcs-pool|aws-pool|aws-pool-backup|gcp-pool|gcp-pool-backup"}
              instant: true
              refId: A
            relativeTimeRange:
              from: 300
              to: 0
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: min
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: OK
        execErrState: OK
        for: 5m
        labels:
          severity: critical
          source: grafana
        annotations:
          summary: "{{ $labels.pool_name }} has no online workers"
          description: "Work pool {{ $labels.pool_name }} has {{ if $values.B }}{{ printf \"%.0f\" $values.B.Value }}{{ else }}0{{ end }} online workers (need >= 1). No heartbeat received for 5+ minutes. The worker container or VM may be down. Flows targeting this pool will queue until a worker reconnects. Check: docker compose ps on the worker host, or SHOW SERVICES for SPCS pools."

